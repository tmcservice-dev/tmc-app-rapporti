<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" id="viewport-meta">
    <title>TMC Service - App Rapporti A4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --tmc-blue: #0054a6; --tmc-light-blue: #f0f7ff; --tmc-dark: #222; }
        
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background: #525659; color: var(--tmc-dark); }
        .page-a4 { 
            background: white; width: 210mm; min-height: 297mm; margin: 10px auto; 
            padding: 2mm 8mm; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; position: relative;
        }

        /* Responsive per schermi piccoli (mobile) */
        @media screen and (max-width: 210mm) {
            body { background: white; }
            .page-a4 { width: 100%; margin: 0; padding: 10px; box-shadow: none; }
        }

        /* Stile speciale per la generazione PDF */
        body.pdf-mode { background: white !important; }
        body.pdf-mode .page-a4 {
            width: 210mm !important;
            height: 297mm !important; 
            max-width: none !important;
            min-height: auto !important;
            margin: 0 !important;
            padding: 2mm 8mm !important;
            box-shadow: none !important;
            border: none !important;
            transform: none !important;
            overflow: hidden !important;
        }
        body.pdf-mode .no-print { display: none !important; }

        /* Elementi Intestazione/Piede statici */
        .banner-static { width: 100%; display: block; }
        
        /* Titolo Principale e Tipo Intervento */
        .main-title-container { 
            display: flex; justify-content: space-between; align-items: center; 
            color: var(--tmc-blue); font-weight: bold; border-top: 2px solid var(--tmc-blue); 
            border-bottom: 2px solid var(--tmc-blue); padding: 4px; margin: 5px 0; 
        }

        .tipo-box { border: 2px solid var(--tmc-blue); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .tipo-box.active { background: var(--tmc-blue); color: white; }

        /* Card Anagrafica */
        .card { border: 1px solid var(--tmc-blue); padding: 6px 10px; margin-bottom: 6px; border-radius: 5px; position: relative; }
        .grid-header { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        
        .input-field label { font-size: 8px; font-weight: bold; color: var(--tmc-blue); display: block; text-transform: uppercase; margin-bottom: 2px; }
        
        /* Input generici (editabili) */
        input, textarea, select { border: none; border-bottom: 1px solid #cce0f5; padding: 4px 0; font-size: 12px; outline: none; width: 100%; background: transparent; }
        .caps { text-transform: uppercase; }

        /* NUOVO STILE PER INPUT ORA NATIIVO (CLOCK PICKER SUL MOBILE) */
        input[type="time"] { 
            font-size: 11px; 
            text-align: center; 
            color: var(--tmc-blue); 
            font-weight: bold; 
            border: 1px solid transparent;
            cursor: pointer;
        }
        /* Rimuovi icona orologio predefinita su alcuni browser per pulizia */
        input[type="time"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-inner-spin-button {
            display: none;
            -webkit-appearance: none;
        }

        /* Combo Tecnico (Input testo sovrapposto a Select) */
        .tecnico-combo { position: relative; width: 100%; height: 25px; }
        .tecnico-input-main { position: absolute; top: 0; left: 0; width: calc(100% - 25px); border-bottom: 1px solid #cce0f5; z-index: 2; background: white; text-transform: uppercase; }
        .tecnico-select-bg { width: 100%; position: relative; z-index: 1; }

        /* Tabelle Ore e Ricambi */
        table { width: 100%; border-collapse: collapse; border: 1px solid var(--tmc-blue); margin-top: 5px; }
        th { background: var(--tmc-light-blue); font-size: 7px; border: 1px solid var(--tmc-blue); padding: 5px 2px; color: var(--tmc-blue); }
        td { border: 1px solid var(--tmc-blue); padding: 3px 1px; text-align: center; }
        
        /* Checkbox PCH */
        .pch-row { display: flex; justify-content: center; gap: 3px; font-size: 9px; font-weight: bold; align-items: center; }
        .pch-row input { width: auto; margin: 0; }

        /* Layout Inferiore (Note e Firma) */
        .bottom-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 15px; margin-top: auto; padding-top: 5px; }
        .dotted-line { border-bottom: 1px dotted var(--tmc-blue); height: 18px; margin-bottom: 5px; }
        
        /* Firma Preview */
        .sig-preview { border: 2px dashed var(--tmc-blue); width: 100%; height: 120px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 5px; box-sizing: border-box; }
        .sig-preview img { width: 100%; height: 100%; object-fit: contain; }

        /* Overlay Firma a schermo intero */
        #signature-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index: 9999; flex-direction: column; }
        #canvas-fullscreen { flex-grow: 1; border: 3px solid var(--tmc-blue); margin: 15px; background: #fafafa; touch-action: none; }

        .footer-static { width: 66%; display: block; margin: 5px auto; }
        
        /* Pulsantiera di controllo (Nascondi in stampa) */
        .no-print { display: flex; flex-wrap: wrap; gap: 10px; padding: 15px; max-width: 210mm; margin: 0 auto; justify-content: center; }
        .btn { flex: 1; min-width: 90px; padding: 12px 5px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; font-size: 11px; text-align: center; }
        .btn-blue { background: var(--tmc-blue); }
        .btn-green { background: #25D366; } 
        .btn-orange { background: #ff9800; } 
        .btn-sync { position: absolute; right: 10px; top: 10px; font-size: 20px; background: none; border: none; cursor: pointer; z-index: 10; }

        @media print { .no-print, .btn-sync { display: none !important; } }
    </style>
</head>
<body>

    <div class="page-a4" id="rapporto-foglio">
        <img src="static/intestazione.jpg" class="banner-static">

        <div class="main-title-container">
            <span>RAPPORTO INTERVENTO N. <input type="text" name="n_rapporto" class="save-data caps" placeholder="XXXX" style="width:70px; font-size:16px; font-weight:bold; color:var(--tmc-blue);"></span>
            <div style="display:flex; gap:8px;">
                <div id="box-G" class="tipo-box" onclick="setTipo('G')">GRATUITO</div>
                <div id="box-P" class="tipo-box" onclick="setTipo('P')">PAGAMENTO</div>
                <input type="hidden" name="tipo_int" id="tipo_int_hidden" class="save-data" value="P">
            </div>
        </div>

        <div class="card">
          <button type="button" class="btn-sync no-print" onclick="importaDaCalendario()" title="Sincronizza">🔄</button>
          
            <div class="grid-header">
                <div>
                    <div class="input-field" style="margin-bottom:10px;">
                        <label>Tecnico/i Incaricato/i</label>
                        <div id="lista-tecnici-inputs">
                            <div class="tecnico-riga" style="display:flex; gap:5px; margin-top:5px;">
                                <div class="tecnico-combo" style="flex:1;">
                                    <input type="text" name="tecnico_1" class="save-data tecnico-input-main caps" placeholder="Scrivi o seleziona...">
                                    <select class="tecnico-select-bg" onchange="this.previousElementSibling.value=this.value; saveDraft();">
                                        <option value=""></option>
                                        <option value="CARINI MARCO">CARINI MARCO</option>
                                        <option value="LIVIU CIORICI">LIVIU CIORICI</option>
                                        <option value="MARIN CIORESCU">MARIN CIORESCU</option>
                                        <option value="ATTILIO MASERATI">ATTILIO MASERATI</option>
                                        <option value="POLLEDRI RICCARDO">POLLEDRI RICCARDO</option>
                                        <option value="GAZZOLA MASSIMO">GAZZOLA MASSIMO</option>
                                        <option value="BRAGHIERI STEFANO">BRAGHIERI STEFANO</option>
                                        <option value="COROLI LORENZO">COROLI LORENZO</option>
                                        <option value="CREMONESI NICOLA">CREMONESI NICOLA</option>
                                        <option value="MARLIERI GIUSEPPE">MARLIERI GIUSEPPE</option>
                                        <option value="MARZAROLI EMILIO">MARZAROLI EMILIO</option>
                                        <option value="PICCOLI GIULIANO">PICCOLI GIULIANO</option>
                                        <option value="IVAN ISOPESCU">IVAN ISOPESCU</option>
                                        <option value="MAZZOCCHI MIRCO">MAZZOCCHI MIRCO</option>
                                        <option value="MOIA LUIGI">MOIA LUIGI</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="no-print" onclick="aggiungiRigaTecnico()" style="font-size:8px; margin-top:5px; border:1px solid #ccc; background:#fff; cursor:pointer;">+ AGGIUNGI TECNICO</button>
                    </div>

                    <div class="input-field">
                        <label>Mezzo di Trasporto</label>
                        <select name="mezzo_trasporto" class="save-data">
                            <option value="MEZZO AZIENDALE">MEZZO AZIENDALE</option>
                            <option value="MEZZO PROPRIO">MEZZO PROPRIO</option>
                        </select>
                    </div>
                </div>

                <div style="border-left: 1px solid #eee; padding-left: 20px;">
                    <div class="input-field" style="margin-bottom:12px;">
                        <label>Cliente</label>
                        <input type="text" name="cliente" class="save-data caps" style="font-size:14px; font-weight:bold;">
                    </div>
                    <div class="input-field" style="margin-bottom:12px;">
                        <label>Sede Intervento</label>
                        <input type="text" name="indirizzo" class="save-data caps">
                    </div>
                    
                    <div style="display:flex; gap:10px;">
                        <div class="input-field" style="flex:1;">
                            <label>Macchina / Matr.</label>
                            <input type="text" name="macchina" class="save-data caps">
                        </div>
                        <div class="input-field" style="flex:1;">
                            <label>Email Cliente</label>
                            <input type="email" name="email_cliente" class="save-data" placeholder="nome@email.it" style="text-transform:none;">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th rowspan="2" style="width: 14%;">DATA</th>
                    <th rowspan="2" style="width: 10%;">TECNICO</th>
                    <th colspan="2">VIAGGIO (A)</th><th colspan="2">LAVORO (M)</th><th colspan="2">LAVORO (P)</th><th colspan="2">VIAGGIO (R)</th>
                    <th rowspan="2" style="width: 8%;">P / C / H</th>
                </tr>
                <tr style="font-size:5px;"><th>DA</th><th>A</th><th>DA</th><th>A</th><th>DA</th><th>A</th><th>DA</th><th>A</th></tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>

        <div class="card" style="margin-top:10px;">
            <label style="color:var(--tmc-blue); font-weight:bold;">PROBLEMA SEGNALATO / LAVORO ESEGUITO</label>
            <textarea name="descrizione" class="save-data caps" rows="3" style="margin-top:5px;"></textarea>
        </div>

        <table>
            <thead><tr><th>CODICE</th><th>RICAMBIO</th><th style="width:10%">Q.TÀ</th><th style="width:15%">UNIT. €</th><th style="width:15%">TOT. €</th></tr></thead>
            <tbody id="ricambi-body"></tbody>
            <tfoot><tr><td colspan="4" style="text-align:right; font-weight:bold; padding-right:5px;">TOTALE MATERIALI:</td><td id="gran-totale" style="font-weight:bold; color:var(--tmc-blue);">0.00 €</td></tr></tfoot>
        </table>

        <div class="bottom-grid">
            <div class="notes-box card" style="margin:0;">
                <label>NOTE / RIEPILOGO SPESE</label>
                <input type="text" name="note_spese_1" class="save-data" placeholder="Scrivi qui eventuali note prestazione..." style="margin-bottom:8px; font-size:9px;">
                <input type="text" name="note_spese_2" class="save-data" placeholder="Scrivi qui eventuali note viaggio..." style="margin-bottom:8px; font-size:9px;">
                
                <div style="font-size:7px;">
                    Totale Ore Calcolate: <span id="tot_lavoro_span" style="color:var(--tmc-blue); font-weight:bold; font-size:8px;"></span> 
                    (V: <span id="tot_viaggio_span" style="color:var(--tmc-blue); font-weight:bold; font-size:8px;"></span>)
                    <div class="dotted-line"></div>
                </div>
            </div>
            
            <div class="sig-box">
                <div class="input-field" style="margin-bottom: 5px;">
                    <label style="color:var(--tmc-blue); font-weight:bold; font-size:8px;">RESPONSABILE (NOME E COGNOME)</label>
                    <input type="text" name="nome_responsabile" class="save-data caps" placeholder="Es. Mario Rossi" style="font-size:12px; font-weight:bold; border-bottom: 1px solid var(--tmc-blue); text-align:center;">
                </div>
                <label style="color:var(--tmc-blue); font-weight:bold; font-size:8px;">FIRMA CLIENTE (TOCCA PER FIRMARE)</label>
                <div id="firma-preview" class="sig-preview" onclick="openSignature()">
                    <span id="placeholder-firma" style="color:#aaa; font-size:10px; text-align:center;">Firma a schermo intero</span>
                    <img id="sig-image" src="" style="display:none;">
                </div>
            </div>
        </div>

        <img src="static/piede.jpg" class="footer-static">
    </div>

    <div class="no-print">
        <button class="btn btn-dark" onclick="addRow()">+ GIORNO/TECNICO</button>
        <button class="btn btn-dark" onclick="addRicambio()">+ RICAMBIO</button>
        <button class="btn btn-blue" onclick="window.print()">SALVA PDF</button>
        <button class="btn btn-green" onclick="condividiWhatsApp()">WHATSAPP</button>
        <button class="btn" style="background:red;" onclick="nuovoRapporto()">RESET NUOVO</button>
    </div>

    <div id="signature-overlay">
        <div style="padding:15px; background:var(--tmc-blue); color:white; display:flex; justify-content:space-between; align-items:center;">
            <b>FIRMA CLIENTE</b>
            <button onclick="closeSignature(true)" style="background:white; color:var(--tmc-blue); border:none; padding:8px 15px; border-radius:4px; font-weight:bold;">CONFERMA</button>
        </div>
        <canvas id="canvas-fullscreen"></canvas>
        <div style="padding:15px; display:flex; gap:10px;">
            <button onclick="clearSignature()" style="flex:1; padding:15px; background:#eee; border:none; border-radius:4px;">CANCELLA</button>
            <button onclick="closeSignature(false)" style="flex:1; padding:15px; background:#ff4444; color:white; border:none; border-radius:4px;">ANNULLA</button>
        </div>
    </div>
    
    <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: sans-serif; font-weight: bold; text-align: center; padding: 20px;">
        <div class="spinner" style="border: 6px solid #f3f3f3; border-top: 6px solid var(--tmc-blue); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <div id="loading-text">Sincronizzazione in corso...<br>Attendere.</div>
    </div>
    <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>

    <script>
        // --- CONFIGURAZIONE ---
        // Sostituisci con l'URL generato da Google Apps Script dopo il deploy
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxh6R-LKwzIsbzNgTyf41AZTs3fxd_CqTE2bLQLQFcx7mwpb-ueqOARluwFPQFW47jM/exec";
        // ----------------------

        let rowCount = 0;
        let ricCount = 0;
        const canvas = document.getElementById('canvas-fullscreen');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // --- FUNZIONI INIZIALIZZAZIONE ---
        window.onload = function() {
            initSignature();
            loadDraft(); 
        };

        // --- GESTIONE TECNICI (Editabile) ---
        function aggiungiRigaTecnico(valore = "") {
            const container = document.getElementById('lista-tecnici-inputs');
            const idx = container.querySelectorAll('.tecnico-riga').length + 1;
            
            const div = document.createElement('div');
            div.className = "tecnico-riga";
            div.style.display = "flex";
            div.style.gap = "5px";
            div.style.marginTop = "5px";

            div.innerHTML = `
                <div class="tecnico-combo" style="flex:1;">
                    <input type="text" name="tecnico_${idx}" class="save-data tecnico-input-main caps" value="${valore.toUpperCase()}">
                    <select class="tecnico-select-bg" onchange="this.previousElementSibling.value=this.value; saveDraft();">
                        <option value=""></option>
                        <option value="CARINI MARCO">CARINI MARCO</option>
                        <option value="LIVIU CIORICI">LIVIU CIORICI</option>
                        <option value="MARIN CIORESCU">MARIN CIORESCU</option>
                        <option value="ATTILIO MASERATI">ATTILIO MASERATI</option>
                        <option value="POLLEDRI RICCARDO">POLLEDRI RICCARDO</option>
                        <option value="GAZZOLA MASSIMO">GAZZOLA MASSIMO</option>
                        <option value="BRAGHIERI STEFANO">BRAGHIERI STEFANO</option>
                        <option value="COROLI LORENZO">COROLI LORENZO</option>
                        <option value="CREMONESI NICOLA">CREMONESI NICOLA</option>
                        <option value="MARLIERI GIUSEPPE">MARLIERI GIUSEPPE</option>
                        <option value="MARZAROLI EMILIO">MARZAROLI EMILIO</option>
                        <option value="PICCOLI GIULIANO">PICCOLI GIULIANO</option>
                        <option value="IVAN ISOPESCU">IVAN ISOPESCU</option>
                        <option value="MAZZOCCHI MIRCO">MAZZOCCHI MIRCO</option>
                        <option value="MOIA LUIGI">MOIA LUIGI</option>
                    </select>
                </div>
                <button type="button" class="no-print" onclick="this.parentElement.remove(); saveDraft();" style="background:#ff4444; color:white; border:none; border-radius:3px; padding:0 8px; font-weight:bold; cursor:pointer;">X</button>
            `;
            container.appendChild(div);
            attachListeners();
        }

        // --- SINCRONIZZAZIONE CALENDARIO (TRAMITE CERVELLO) ---
        async function importaDaCalendario() {
            // Prende il nome del primo tecnico inserito
            const t1Input = document.getElementsByName('tecnico_1')[0];
            const nomeTecnico = t1Input ? t1Input.value : "";

            if (!nomeTecnico || nomeTecnico === "") {
                alert("⚠️ Inserisci il nome di un tecnico nel primo campo (Anagrafica) per sincronizzare.");
                return;
            }

            document.getElementById('loading-overlay').style.display = 'flex';

            try {
                // Chiama il Cervello su GAS
                const response = await fetch(`${APP_SCRIPT_URL}?tecnico=${encodeURIComponent(nomeTecnico)}`);
                const data = await response.json();
                
                document.getElementById('loading-overlay').style.display = 'none';

                if (data.cliente) {
                    // Carica Dati Principali
                    document.getElementById('rapporto-foglio').querySelectorAll('input, select, textarea').forEach(el => {
                        if (data[el.name] !== undefined) el.value = data[el.name];
                    });
                    setTipo(data.tipo_int || 'P');

                    // Gestione Tecnici Multipli
                    const container = document.getElementById('lista-tecnici-inputs');
                    // Rimuove extra vecchi
                    while (container.children.length > 1) { container.removeChild(container.lastChild); }
                    
                    if(data.tecnici && data.tecnici.length > 0) {
                        t1Input.value = data.tecnici[0].toUpperCase(); // Primo
                        for (let i = 1; i < data.tecnici.length; i++) {
                            aggiungiRigaTecnico(data.tecnici[i]); // Aggiunge altri
                        }
                    }

                    saveDraft();
                    alert("✅ Sincronizzazione completata! Verifica i dati.");
                } else if (data.error) { alert("⚠️ " + data.error); }
                else { alert("❓ Nessun intervento trovato oggi per questo tecnico."); }

            } catch (error) {
                document.getElementById('loading-overlay').style.display = 'none';
                alert("❌ Errore durante la connessione al Cervello.\nVerifica l'URL di Apps Script o la connessione internet.");
                console.error(error);
            }
        }

        function setTipo(val) {
            document.getElementById('tipo_int_hidden').value = val;
            document.getElementById('box-G').className = 'tipo-box' + (val === 'G' ? ' active' : '');
            document.getElementById('box-P').className = 'tipo-box' + (val === 'P' ? ' active' : '');
            saveDraft();
        }

        // --- GESTIONE RIGHE ORE (Editabile, Clock Picker nativo) ---
        function addRow() {
            rowCount++;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="date" class="save-data" name="d_${rowCount}" style="font-size:9px; text-align:center; width:100%;"></td>
                <td><input type="text" class="save-data caps" name="tec_${rowCount}" placeholder="Nome" style="font-size:8px; text-align:center; width:100%;"></td>
                
                <td><input type="time" class="save-data" name="va1_${rowCount}" onchange="autoFillNext(this)"></td>
                <td><input type="time" class="save-data" name="va2_${rowCount}" onchange="autoFillNext(this)"></td>
                <td><input type="time" class="save-data" name="lm1_${rowCount}" onchange="autoFillNext(this)"></td>
                <td><input type="time" class="save-data" name="lm2_${rowCount}" onchange="autoFillNext(this)"></td>
                <td><input type="time" class="save-data" name="lp1_${rowCount}" onchange="autoFillNext(this)"></td>
                <td><input type="time" class="save-data" name="lp2_${rowCount}" onchange="autoFillNext(this)"></td>
                <td><input type="time" class="save-data" name="vr1_${rowCount}" onchange="autoFillNext(this)"></td>
                <td><input type="time" class="save-data" name="vr2_${rowCount}"></td>
                
                <td>
                    <div class="pch-row">
                        P<input type="checkbox" class="save-data" name="p_${rowCount}">
                        C<input type="checkbox" class="save-data" name="c_${rowCount}">
                        H<input type="checkbox" class="save-data" name="h_${rowCount}">
                    </div>
                </td>`;
            document.getElementById('table-body').appendChild(tr); 
            attachListeners();
        }

        // Autocompilazione Intelligente a Cascata (valida anche per input time)
        function autoFillNext(currentEl) {
            const tr = currentEl.closest('tr');
            const timeInputs = Array.from(tr.querySelectorAll('input[type="time"]'));
            const currentIndex = timeInputs.indexOf(currentEl);
            
            if (currentEl.value && currentIndex !== -1 && currentIndex < timeInputs.length - 1) {
                const nextInput = timeInputs[currentIndex + 1];
                // Compila il successivo solo se è vuoto
                if (!nextInput.value) { nextInput.value = currentEl.value; }
            }
            calc(); // Ricalcola totali
        }

        // --- GESTIONE RICAMBI (Editabile) ---
        function addRicambio() {
            ricCount++;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><input type="text" class="save-data caps" name="rc_${ricCount}"></td><td><input type="text" class="save-data caps" name="rd_${ricCount}"></td>
                <td><input type="number" class="save-data qta" name="rq_${ricCount}" oninput="calc()"></td><td><input type="number" class="save-data unit" name="ru_${ricCount}" step="0.01" oninput="calc()"></td>
                <td><input type="text" id="rt_${ricCount}" readonly style="background:#f9f9f9;"></td>`;
            document.getElementById('ricambi-body').appendChild(tr); attachListeners();
        }

        // --- CALCOLI TOTALI (Materiali e Ore) ---
        function calc() {
            // 1. Totale Materiali
            let gt = 0;
            for(let i=1; i<=ricCount; i++) {
                const qInput = document.getElementsByName(`rq_${i}`)[0];
                const uInput = document.getElementsByName(`ru_${i}`)[0];
                const tOutput = document.getElementById(`rt_${i}`);
                if(qInput && uInput && tOutput) {
                    const q = parseFloat(qInput.value) || 0;
                    const u = parseFloat(uInput.value) || 0;
                    const tot = q * u;
                    tOutput.value = tot.toFixed(2);
                    gt += tot;
                }
            }
            document.getElementById('gran-totale').innerText = gt.toFixed(2) + " €";

            // 2. Totale Ore (Rimane editabile fino al PDF)
            // Helper convertitore
            function timeToMinutes(timeStr) {
                if (!timeStr) return 0;
                let parts = timeStr.split(':');
                return parseInt(parts[0]) * 60 + parseInt(parts[1]);
            }
            const getDiff = (t1, t2) => {
                if(!t1 || !t2) return 0;
                let m1 = timeToMinutes(t1);
                let m2 = timeToMinutes(t2);
                if (m2 < m1) m2 += 24 * 60; // Passaggio mezzanotte (raro ma gestito)
                return m2 - m1;
            };

            let totLavoro = 0; let totViaggio = 0;
            for(let i=1; i<=rowCount; i++) {
                let va1 = document.getElementsByName(`va1_${i}`)[0]?.value;
                let va2 = document.getElementsByName(`va2_${i}`)[0]?.value;
                let lm1 = document.getElementsByName(`lm1_${i}`)[0]?.value;
                let lm2 = document.getElementsByName(`lm2_${i}`)[0]?.value;
                let lp1 = document.getElementsByName(`lp1_${i}`)[0]?.value;
                let lp2 = document.getElementsByName(`lp2_${i}`)[0]?.value;
                let vr1 = document.getElementsByName(`vr1_${i}`)[0]?.value;
                let vr2 = document.getElementsByName(`vr2_${i}`)[0]?.value;

                totViaggio += getDiff(va1, va2) + getDiff(vr1, vr2);
                totLavoro += getDiff(lm1, lm2) + getDiff(lp1, lp2);
            }

            const formatOre = (mins) => {
                let h = Math.floor(mins / 60);
                let m = mins % 60;
                return `${h}h ${m > 0 ? m + 'm' : ''}`;
            };

            document.getElementById('tot_lavoro_span').innerText = formatOre(totLavoro);
            document.getElementById('tot_viaggio_span').innerText = formatOre(totViaggio);

            saveDraft();
        }

        // --- GESTIONE FIRMA ---
        function initSignature() {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 3; ctx.strokeStyle = "#000"; ctx.lineCap = "round";
            // Touch events per mobile
            canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); });
            canvas.addEventListener('touchmove', (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); });
            canvas.addEventListener('touchend', () => drawing = false);
        }
        function openSignature() { document.getElementById('signature-overlay').style.display = 'flex'; initSignature(); }
        function closeSignature(save) {
            if(save) {
                const url = canvas.toDataURL();
                document.getElementById('sig-image').src = url;
                document.getElementById('sig-image').style.display = 'block';
                document.getElementById('placeholder-firma').style.display = 'none';
                localStorage.setItem('tmc_sig', url);
            }
            document.getElementById('signature-overlay').style.display = 'none';
        }
        function clearSignature() { ctx.clearRect(0,0,canvas.width, canvas.height); }
        function getPos(e) { const rect = canvas.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY; return { x: cx - rect.left, y: cy - rect.top }; }

        // --- GESTIONE BOZZA (Autosave/Editabilità) ---
        function attachListeners() { document.querySelectorAll('.save-data').forEach(el => { el.oninput = calc; el.onchange = calc; }); }
        
        function saveDraft() {
            const data = {}; document.querySelectorAll('.save-data').forEach(el => data[el.name] = (el.type==='checkbox' ? el.checked : el.value));
            localStorage.setItem('tmc_bozza', JSON.stringify(data));
            localStorage.setItem('tmc_counts', JSON.stringify({r:rowCount, ric:ricCount}));
        }
        
        function loadDraft() {
            const counts = JSON.parse(localStorage.getItem('tmc_counts') || '{"r":1,"ric":1}');
            document.getElementById('table-body').innerHTML = "";
            document.getElementById('ricambi-body').innerHTML = "";
            rowCount = 0; ricCount = 0;
            // Rigenera struttura
            for(let i=0; i<counts.r; i++) addRow();
            for(let i=0; i<counts.ric; i++) addRicambio();
            // Popola dati
            const saved = JSON.parse(localStorage.getItem('tmc_bozza') || '{}');
            // Gestione Tecnici extra
            let tCount = 1;
            while(saved['tecnico_' + tCount] !== undefined) {
                if(tCount > 1) aggiungiRigaTecnico(saved['tecnico_' + tCount]);
                else document.getElementsByName('tecnico_1')[0].value = (saved['tecnico_1'] || "").toUpperCase();
                tCount++;
            }
            // Popola campi standard e input time/check
            document.querySelectorAll('.save-data').forEach(el => { 
                if(saved[el.name]!==undefined) el.type==='checkbox' ? el.checked=saved[el.name] : el.value=saved[el.name]; 
            });
            // Firma
            const sig = localStorage.getItem('tmc_sig');
            if(sig) { document.getElementById('sig-image').src = sig; document.getElementById('sig-image').style.display='block'; document.getElementById('placeholder-firma').style.display='none'; }
            setTipo(saved['tipo_int'] || 'P');
            calc();
        }
        
        function nuovoRapporto() { if(confirm("Cancellare tutti i dati a schermo e iniziare un modulo vuoto?")) { localStorage.removeItem('tmc_bozza'); localStorage.removeItem('tmc_counts'); localStorage.removeItem('tmc_sig'); location.reload(); } }

        // --- EXPORT & SHARING (Rapporto editabile fino a qui) ---
        function preparaSchermoPerPDF() {
            window.scrollTo(0, 0); // Risale in alto
            // Forza layout desktop per html2pdf
            document.getElementById('viewport-meta').setAttribute('content', 'width=1024');
            document.body.classList.add('pdf-mode');
        }

        function ripristinaSchermo() {
            // Ripristina layout mobile
            document.getElementById('viewport-meta').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
            document.body.classList.remove('pdf-mode');
        }

        function getPdfOptions(fileName) {
            return {
                margin: 0, 
                filename: fileName, 
                image: { type: 'jpeg', quality: 0.98 }, 
                html2canvas: { scale: 2, useCORS: true, scrollY: 0 }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
        }

        // WhatsApp Share (Android canShare)
        function condividiWhatsApp() {
            calc(); // Ricalcolo finale
            const element = document.getElementById('rapporto-foglio');
            const nomeCliente = document.getElementsByName('cliente')[0].value || 'Cliente';
            const fileName = `Rapporto_TMC_${nomeCliente}.pdf`.replace(/ /g, "_");

            alert("Generazione del PDF in corso... Attendi l'apertura del menu di condivisione.");
            preparaSchermoPerPDF();

            setTimeout(() => {
                html2pdf().set(getPdfOptions(fileName)).from(element).output('blob').then(function(pdfBlob) {
                    ripristinaSchermo();
                    const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
                    // Verifica supporto navigatore Web Share API per file
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({ title: 'Rapporto di Intervento', text: 'In allegato il rapporto di intervento.', files: [file] });
                    } else {
                        // Fallback: download semplice
                        html2pdf().set(getPdfOptions(fileName)).from(element).save();
                        alert("Il dispositivo non supporta la condivisione diretta. Il PDF è stato scaricato nella cartella Download. Puoi allegarlo manualmente.");
                    }
                }).catch(err => { ripristinaSchermo(); console.error(err); });
            }, 100);
        }
    </script>
